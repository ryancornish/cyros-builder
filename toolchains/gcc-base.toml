name = "gcc-base"

[tools]
cc = "gcc-15"
cxx = "g++-15"
ar = "gcc-ar-15"
asm = "gcc-15"

[flags]
common = []
c = ["-std=c23", "-Wall", "-Werror", "-Wextra", "-Wpedantic"]
cxx = ["-std=gnu++23", "-Wall", "-Werror", "-Wextra", "-Wpedantic"]
asm = []
link = []

[settings]
family = "gcc"
debug = false
optimization = "0"
warnings_as_errors = false